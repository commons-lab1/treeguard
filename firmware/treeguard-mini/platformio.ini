[env:attiny1614]
platform = atmelmegaavr
board = ATtiny1614
framework = arduino
upload_protocol = jtag2updi
upload_speed = 115200

; MegaTinyCore settings
board_build.f_cpu = 5000000L  ; 5 MHz for low power
build_flags =
    -DMOISTURE_PIN=PIN_PA1
    -DLED_RED_PIN=PIN_PA4
    -DLED_GREEN_PIN=PIN_PA5
    -DSENSOR_POWER_PIN=PIN_PA6
