[env:attiny1614]
platform = atmelmegaavr
board = ATtiny1614
framework = arduino
upload_protocol = jtag2updi
upload_speed = 115200

; MegaTinyCore settings
; See https://github.com/SpenceKonde/megaTinyCore for board support
board_build.f_cpu = 5000000L  ; 5 MHz for low power
board_build.millis_timer = RTC  ; use RTC for millis(), lower power than TCA

build_flags =
    -DMOISTURE_PIN=PIN_PA1
    -DLED_RED_PIN=PIN_PA4
    -DLED_GREEN_PIN=PIN_PA5
    -DSENSOR_POWER_PIN=PIN_PA6
    -Os  ; optimize for size
