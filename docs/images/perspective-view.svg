<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <style>
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #555; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .callout { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #1B5E20; font-weight: bold; }
    </style>
    <linearGradient id="ground3d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B5214"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" class="title">3/4 PERSPECTIVE VIEW — DEPLOYED</text>

  <!-- Background -->
  <rect x="30" y="40" width="540" height="630" rx="8" fill="#E3F2E1" stroke="#C8E6C9" stroke-width="1"/>

  <!-- Ground plane (isometric-ish) -->
  <polygon points="80,480 300,550 520,480 300,410" fill="url(#ground3d)" opacity="0.6"/>
  <polygon points="80,480 300,550 520,480 300,410" fill="none" stroke="#7A5B1E" stroke-width="1"/>

  <!-- Ground texture -->
  <g fill="#7A5B1E" opacity="0.3">
    <ellipse cx="200" cy="470" rx="15" ry="4"/>
    <ellipse cx="350" cy="490" rx="12" ry="3"/>
    <ellipse cx="280" cy="510" rx="10" ry="3"/>
    <ellipse cx="400" cy="460" rx="8" ry="2"/>
  </g>

  <!-- Grass tufts -->
  <g stroke="#4CAF50" stroke-width="1.5" fill="none">
    <path d="M120,475 Q123,460 127,475"/>
    <path d="M430,470 Q433,458 436,470"/>
    <path d="M250,525 Q253,515 256,525"/>
    <path d="M370,510 Q373,500 376,510"/>
  </g>

  <!-- Shadow on ground -->
  <ellipse cx="300" cy="480" r="80" ry="25" fill="#333" opacity="0.06"/>

  <!-- === TREE === -->
  <!-- Trunk (isometric) -->
  <polygon points="288,320 312,320 315,475 285,475" fill="#8B5E3C"/>
  <polygon points="288,320 312,320 315,475 285,475" fill="#6B4226" opacity="0.3"/>
  <!-- Trunk highlight -->
  <polygon points="293,325 305,325 307,470 291,470" fill="#9E7B5A" opacity="0.3"/>

  <!-- Canopy -->
  <g filter="url(#shadow)">
    <g fill="#4CAF50">
      <ellipse cx="300" cy="240" rx="70" ry="80"/>
      <ellipse cx="255" cy="280" rx="40" ry="45" transform="rotate(-10,255,280)"/>
      <ellipse cx="345" cy="270" rx="35" ry="40" transform="rotate(8,345,270)"/>
      <ellipse cx="305" cy="175" rx="30" ry="40"/>
    </g>
    <g fill="#66BB6A" opacity="0.4">
      <ellipse cx="280" cy="230" rx="25" ry="30"/>
      <ellipse cx="320" cy="200" rx="18" ry="25"/>
    </g>
    <g fill="#2E7D32" opacity="0.3">
      <ellipse cx="330" cy="260" rx="20" ry="28"/>
      <ellipse cx="270" cy="270" rx="18" ry="22"/>
    </g>
  </g>

  <!-- === TREEGUARD FRAME (3/4 perspective) === -->

  <!-- Left spine (visible, further) -->
  <polygon points="205,225 215,225 218,470 208,470" fill="#2E7D32" stroke="#1B5E20" stroke-width="1"/>

  <!-- Right-front spine (visible, closer, has electronics) -->
  <polygon points="370,230 382,230 385,470 373,470" fill="#1B5E20" stroke="#0D3B0D" stroke-width="1.5"/>

  <!-- Back spine (partially hidden) -->
  <polygon points="295,215 303,215 305,460 297,460" fill="#388E3C" opacity="0.35"/>

  <!-- Ring level 1 (bottom) — 3D perspective -->
  <g>
    <!-- Front-right to back -->
    <polygon points="375,425 300,412 300,418 375,431" fill="#43A047" stroke="#2E7D32" stroke-width="0.5"/>
    <!-- Back to left -->
    <polygon points="300,412 212,430 212,436 300,418" fill="#43A047" stroke="#2E7D32" stroke-width="0.5" opacity="0.7"/>
    <!-- Left to front-right (front face) -->
    <polygon points="212,430 375,425 375,431 212,436" fill="#66BB6A" stroke="#43A047" stroke-width="0.5"/>
    <!-- Mesh openings -->
    <g fill="#E3F2E1" opacity="0.4">
      <rect x="230" y="428" width="25" height="4" rx="1" transform="rotate(-1)"/>
      <rect x="270" y="427" width="25" height="4" rx="1"/>
      <rect x="320" y="426" width="25" height="4" rx="1"/>
    </g>
  </g>

  <!-- Ring level 2 (middle) -->
  <g>
    <polygon points="375,365 300,352 300,358 375,371" fill="#43A047" stroke="#2E7D32" stroke-width="0.5"/>
    <polygon points="300,352 212,370 212,376 300,358" fill="#43A047" stroke="#2E7D32" stroke-width="0.5" opacity="0.7"/>
    <polygon points="212,370 375,365 375,371 212,376" fill="#66BB6A" stroke="#43A047" stroke-width="0.5"/>
    <g fill="#E3F2E1" opacity="0.4">
      <rect x="230" y="368" width="25" height="4" rx="1"/>
      <rect x="270" y="367" width="25" height="4" rx="1"/>
      <rect x="320" y="366" width="25" height="4" rx="1"/>
    </g>
  </g>

  <!-- Ring level 3 (top) -->
  <g>
    <polygon points="375,295 300,282 300,288 375,301" fill="#43A047" stroke="#2E7D32" stroke-width="0.5"/>
    <polygon points="300,282 212,300 212,306 300,288" fill="#43A047" stroke="#2E7D32" stroke-width="0.5" opacity="0.7"/>
    <polygon points="212,300 375,295 375,301 212,306" fill="#66BB6A" stroke="#43A047" stroke-width="0.5"/>
    <g fill="#E3F2E1" opacity="0.4">
      <rect x="230" y="298" width="25" height="4" rx="1"/>
      <rect x="270" y="297" width="25" height="4" rx="1"/>
      <rect x="320" y="296" width="25" height="4" rx="1"/>
    </g>
  </g>

  <!-- Vertical mesh bars (front face only) -->
  <g stroke="#66BB6A" stroke-width="2.5" opacity="0.45">
    <line x1="250" y1="298" x2="250" y2="370"/>
    <line x1="320" y1="296" x2="320" y2="366"/>
    <line x1="250" y1="370" x2="250" y2="430"/>
    <line x1="320" y1="366" x2="320" y2="427"/>
  </g>

  <!-- Electronics enclosure (on right-front spine) -->
  <g transform="translate(385, 340)">
    <rect x="0" y="-16" width="50" height="35" rx="5" fill="#616161" stroke="#424242" stroke-width="1.5"/>
    <rect x="4" y="-12" width="42" height="27" rx="3" fill="#757575" opacity="0.3"/>

    <!-- LEDs -->
    <circle cx="14" cy="-10" r="5" fill="#FF1744" stroke="#D50000" stroke-width="1"/>
    <!-- Glow rings -->
    <circle cx="14" cy="-10" r="10" fill="#FF1744" opacity="0.15"/>
    <circle cx="14" cy="-10" r="16" fill="#FF1744" opacity="0.07"/>
    <circle cx="14" cy="-10" r="22" fill="#FF1744" opacity="0.03"/>

    <circle cx="32" cy="-10" r="5" fill="#00E676" stroke="#00C853" stroke-width="1"/>
  </g>

  <!-- Solar panel (on top of right-front spine, tilted) -->
  <g transform="translate(375, 220)">
    <!-- Bracket -->
    <polygon points="0,10 10,10 12,0 2,0" fill="#9E9E9E"/>
    <!-- Panel (angled) -->
    <polygon points="-5,-25 55,-15 50,10 -10,0" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
    <!-- Grid -->
    <g stroke="#1976D2" stroke-width="0.4">
      <line x1="7" y1="-22" x2="2" y2="3"/>
      <line x1="20" y1="-20" x2="15" y2="5"/>
      <line x1="33" y1="-18" x2="28" y2="7"/>
      <line x1="-3" y1="-15" x2="52" y2="-5"/>
      <line x1="-6" y1="-5" x2="49" y2="5"/>
    </g>
  </g>

  <!-- QR code sticker -->
  <rect x="215" y="372" width="20" height="20" rx="1.5" fill="white" stroke="#999" stroke-width="0.5"/>
  <g fill="#333" transform="translate(217,374)">
    <rect width="3" height="3"/>
    <rect x="5" width="2" height="2"/>
    <rect x="13" width="3" height="3"/>
    <rect y="5" width="2" height="2"/>
    <rect x="7" y="5" width="2" height="2"/>
    <rect y="13" width="3" height="3"/>
    <rect x="7" y="11" width="3" height="3"/>
  </g>

  <!-- Signage -->
  <rect x="235" y="395" width="35" height="22" rx="2" fill="#f0f7e6" stroke="#3a7a3a" stroke-width="0.5"/>
  <text x="252" y="404" text-anchor="middle" font-family="Arial" font-size="4" fill="#1a5c1a" font-weight="bold">TreeGuard</text>
  <text x="252" y="411" text-anchor="middle" font-family="Arial" font-size="3" fill="#cc0000">WATER ONLY</text>

  <!-- Sensor wire hint going into ground -->
  <line x1="378" y1="460" x2="370" y2="490" stroke="#F57C00" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="367" cy="495" r="3" fill="#FFB74D" stroke="#F57C00" stroke-width="0.8"/>

  <!-- === ANNOTATIONS === -->

  <!-- Person silhouette for scale (walking by) -->
  <g transform="translate(500, 340)" opacity="0.2">
    <!-- Head -->
    <circle cx="0" cy="0" r="12"/>
    <!-- Body -->
    <line x1="0" y1="12" x2="0" y2="55" stroke="#333" stroke-width="4"/>
    <!-- Arms -->
    <line x1="-18" y1="30" x2="18" y2="25" stroke="#333" stroke-width="3"/>
    <!-- Legs -->
    <line x1="0" y1="55" x2="-12" y2="90" stroke="#333" stroke-width="3"/>
    <line x1="0" y1="55" x2="14" y2="88" stroke="#333" stroke-width="3"/>
    <!-- Water bottle in hand -->
    <rect x="15" y="18" width="8" height="18" rx="3" fill="#29B6F6" stroke="#0288D1" stroke-width="0.5" opacity="1"/>
  </g>
  <text x="500" y="445" text-anchor="middle" class="label" opacity="0.5">scale reference</text>

  <!-- LED callout -->
  <line x1="440" y1="315" x2="490" y2="270" stroke="#D50000" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="460" y="252" width="100" height="36" rx="4" fill="white" stroke="#D50000" stroke-width="1"/>
  <text x="510" y="267" text-anchor="middle" class="callout" fill="#D50000">RED = THIRSTY</text>
  <text x="510" y="280" text-anchor="middle" class="label">Please water ~1L</text>

  <!-- Solar callout -->
  <line x1="420" y1="210" x2="470" y2="160" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="472" y="155" class="label">Solar charges</text>
  <text x="472" y="167" class="label">internal battery</text>

  <!-- Frame callout -->
  <line x1="210" y1="310" x2="110" y2="280" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="60" y="272" class="label" text-anchor="end">Protective</text>
  <text x="60" y="284" class="label" text-anchor="end">PETG frame</text>
  <text x="60" y="296" class="label" text-anchor="end">(no trunk contact)</text>

  <!-- QR callout -->
  <line x1="215" y1="385" x2="120" y2="400" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="60" y="396" class="label" text-anchor="end">Scan for tree</text>
  <text x="60" y="408" class="label" text-anchor="end">info + log watering</text>

  <!-- Sensor callout -->
  <line x1="367" y1="498" x2="370" y2="540" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="372" y="548" class="label">Soil sensor</text>
  <text x="372" y="560" class="label">below surface</text>

  <!-- Title plate at bottom -->
  <rect x="120" y="590" width="360" height="55" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="300" y="612" text-anchor="middle" font-family="'Helvetica Neue', Arial" font-size="14" font-weight="bold" fill="#1B5E20">TreeGuard — Open Source Tree Guardian</text>
  <text x="300" y="630" text-anchor="middle" font-family="'Helvetica Neue', Arial" font-size="11" fill="#666">commons-lab/treeguard | CERN-OHL-S + MIT + CC BY-SA</text>
</svg>
