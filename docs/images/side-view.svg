<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700">
  <defs>
    <style>
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #555; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .dim { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #888; }
    </style>
    <linearGradient id="soil2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C4A1E"/>
    </linearGradient>
    <linearGradient id="trunk2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="40%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5C3317"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" class="title">SIDE VIEW (electronics spine facing viewer)</text>

  <!-- Background -->
  <rect x="50" y="40" width="400" height="620" rx="8" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="1"/>

  <!-- Ground -->
  <rect x="50" y="480" width="400" height="180" rx="0 0 8 8" fill="url(#soil2)"/>
  <path d="M50,480 Q150,474 250,480 Q350,486 450,480" fill="none" stroke="#7A5B1E" stroke-width="2"/>

  <!-- Grass -->
  <g stroke="#4CAF50" stroke-width="1.5" fill="none">
    <path d="M90,480 Q93,468 96,480"/>
    <path d="M190,480 Q193,470 196,480"/>
    <path d="M380,480 Q383,470 386,480"/>
  </g>

  <!-- Tree trunk -->
  <rect x="240" y="280" width="22" height="205" rx="3" fill="url(#trunk2)"/>
  <g stroke="#5C3317" stroke-width="0.5" opacity="0.3">
    <line x1="245" y1="300" x2="245" y2="330"/>
    <line x1="253" y1="350" x2="253" y2="390"/>
    <line x1="248" y1="410" x2="248" y2="450"/>
  </g>

  <!-- Canopy -->
  <g fill="#4CAF50">
    <ellipse cx="251" cy="230" rx="55" ry="65"/>
    <ellipse cx="220" cy="270" rx="28" ry="30"/>
    <ellipse cx="280" cy="260" rx="25" ry="28"/>
    <ellipse cx="255" cy="175" rx="22" ry="28"/>
  </g>
  <g fill="#66BB6A" opacity="0.3">
    <ellipse cx="240" cy="220" rx="18" ry="22"/>
    <ellipse cx="265" cy="195" rx="12" ry="16"/>
  </g>

  <!-- === FRAME (side profile - two spines visible) === -->

  <!-- Front spine (closest to viewer, with electronics) -->
  <rect x="280" y="190" width="14" height="295" rx="4" fill="#1B5E20" stroke="#0D3B0D" stroke-width="1"/>

  <!-- Back spine (partially visible behind tree) -->
  <rect x="200" y="190" width="10" height="295" rx="3" fill="#2E7D32" opacity="0.5" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- Third spine hint (behind trunk, barely visible) -->
  <rect x="248" y="195" width="6" height="290" rx="2" fill="#388E3C" opacity="0.25"/>

  <!-- Ring bars (connecting spines, seen from side as horizontal lines) -->
  <!-- Ring 1 - bottom -->
  <line x1="200" y1="430" x2="294" y2="430" stroke="#43A047" stroke-width="8" stroke-linecap="round"/>
  <!-- Ring 2 - middle -->
  <line x1="200" y1="355" x2="294" y2="355" stroke="#43A047" stroke-width="8" stroke-linecap="round"/>
  <!-- Ring 3 - top -->
  <line x1="200" y1="270" x2="294" y2="270" stroke="#43A047" stroke-width="8" stroke-linecap="round"/>

  <!-- Vertical mesh bars in ring segments -->
  <g stroke="#66BB6A" stroke-width="3" opacity="0.5">
    <!-- Between ring 1 and ring 2 -->
    <line x1="225" y1="355" x2="225" y2="430"/>
    <line x1="260" y1="355" x2="260" y2="430"/>
    <!-- Between ring 2 and ring 3 -->
    <line x1="225" y1="270" x2="225" y2="355"/>
    <line x1="260" y1="270" x2="260" y2="355"/>
  </g>

  <!-- Solar panel (angled on top of front spine) -->
  <g transform="translate(287, 185)">
    <!-- Tilt bracket -->
    <polygon points="0,5 8,-2 8,5" fill="#757575"/>
    <!-- Panel surface at 30 degrees -->
    <rect x="-5" y="-32" width="50" height="32" rx="2" fill="#1565C0" stroke="#0D47A1" stroke-width="1"
          transform="rotate(-30, 20, -16)"/>
    <!-- Grid lines -->
    <g transform="rotate(-30, 20, -16)" stroke="#1976D2" stroke-width="0.5">
      <line x1="7" y1="-31" x2="7" y2="-1"/>
      <line x1="19" y1="-31" x2="19" y2="-1"/>
      <line x1="31" y1="-31" x2="31" y2="-1"/>
      <line x1="-4" y1="-22" x2="44" y2="-22"/>
      <line x1="-4" y1="-12" x2="44" y2="-12"/>
    </g>
  </g>

  <!-- Electronics enclosure (on front spine, protruding) -->
  <rect x="294" y="325" width="48" height="32" rx="5" fill="#616161" stroke="#424242" stroke-width="1.5"/>
  <!-- Inner detail -->
  <rect x="298" y="329" width="40" height="24" rx="3" fill="#757575" opacity="0.4"/>

  <!-- LEDs on enclosure face -->
  <circle cx="308" cy="335" r="4.5" fill="#FF1744" stroke="#D50000" stroke-width="1"/>
  <!-- Red glow -->
  <circle cx="308" cy="335" r="9" fill="#FF1744" opacity="0.15"/>
  <circle cx="308" cy="335" r="14" fill="#FF1744" opacity="0.07"/>

  <circle cx="324" cy="335" r="4.5" fill="#00E676" stroke="#00C853" stroke-width="1"/>

  <!-- Wire running down spine to sensor -->
  <path d="M300,357 L300,480 L290,510" stroke="#F57C00" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- Sensor probe underground -->
  <rect x="285" y="510" width="8" height="90" rx="3" fill="#66BB6A" opacity="0.5"/>
  <rect x="283" y="592" width="12" height="22" rx="4" fill="#FFB74D" stroke="#F57C00" stroke-width="1"/>

  <!-- Ground stakes -->
  <g opacity="0.4">
    <!-- Front stake -->
    <rect x="285" y="480" width="5" height="70" fill="#9E9E9E"/>
    <polygon points="285,550 290,550 287.5,565" fill="#9E9E9E"/>
    <!-- Back stake -->
    <rect x="203" y="480" width="4" height="60" fill="#9E9E9E"/>
    <polygon points="203,540 207,540 205,553" fill="#9E9E9E"/>
  </g>

  <!-- QR code on ring -->
  <rect x="205" y="360" width="18" height="18" rx="1" fill="white" stroke="#999" stroke-width="0.5"/>
  <g fill="#333" transform="translate(207,362)">
    <rect width="3" height="3"/>
    <rect x="5" width="2" height="2"/>
    <rect x="11" width="3" height="3"/>
    <rect y="5" width="2" height="2"/>
    <rect x="6" y="5" width="2" height="2"/>
    <rect y="11" width="3" height="3"/>
    <rect x="6" y="10" width="3" height="3"/>
  </g>

  <!-- === ANNOTATIONS === -->

  <!-- Solar angle -->
  <line x1="315" y1="165" x2="405" y2="90" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="407" y="85" class="label">Solar panel</text>
  <text x="407" y="97" class="label">~30 deg tilt</text>

  <!-- Enclosure -->
  <line x1="342" y1="340" x2="405" y2="340" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="407" y="335" class="label">Sealed enclosure</text>
  <text x="407" y="347" class="label">(MCU + battery)</text>

  <!-- LED -->
  <line x1="310" y1="320" x2="405" y2="290" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="407" y="285" class="label">LEDs face</text>
  <text x="407" y="297" class="label">outward (path-side)</text>

  <!-- Wire -->
  <line x1="300" y1="490" x2="370" y2="490" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="372" y="488" class="label">Sensor wire</text>
  <text x="372" y="500" class="label">(routed down spine)</text>

  <!-- Sensor depth -->
  <line x1="280" y1="600" x2="370" y2="580" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="372" y="575" class="label">Capacitive probe</text>
  <text x="372" y="587" class="label">at root depth</text>

  <!-- Back spine -->
  <line x1="195" y1="250" x2="100" y2="230" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="55" y="225" class="label" text-anchor="end">Rear spine</text>
  <text x="55" y="237" class="label" text-anchor="end">(behind tree)</text>

  <!-- Dimensions -->
  <!-- Height above ground -->
  <line x1="130" y1="190" x2="130" y2="480" stroke="#AAA" stroke-width="0.5"/>
  <line x1="125" y1="190" x2="135" y2="190" stroke="#AAA" stroke-width="0.5"/>
  <line x1="125" y1="480" x2="135" y2="480" stroke="#AAA" stroke-width="0.5"/>
  <text x="128" y="340" text-anchor="middle" class="dim" transform="rotate(-90,128,340)">700 mm above ground</text>

  <!-- Sensor depth -->
  <line x1="400" y1="510" x2="400" y2="614" stroke="#AAA" stroke-width="0.5"/>
  <line x1="395" y1="510" x2="405" y2="510" stroke="#AAA" stroke-width="0.5"/>
  <line x1="395" y1="614" x2="405" y2="614" stroke="#AAA" stroke-width="0.5"/>
  <text x="412" y="565" class="dim">200-300</text>
  <text x="412" y="577" class="dim">mm deep</text>
</svg>
